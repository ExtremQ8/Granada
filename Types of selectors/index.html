<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Types of selectors</h1>
    <!-- Selectors of elements-->
    <p>Selectors of elements(p)</p>
    <div>Selector of element (div)</div>
    <!--selectors for classes-->
    <p class="rojo">Classes selector (.rojo)</p>
    <p class="grande">Classes selector (.grande)</p>
    <p class="rojo grande">Two classes at the same time</p>
    <!-- ID selector-->
    <p id="unico">Selector for ID (#unico)</p>
    <div class="container">
      <p>Direct son</p>
      <div>
        <p>Nested descendant</p>
      </div>
    </div>
  </body>
